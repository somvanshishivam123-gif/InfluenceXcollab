<!DOCTYPE html>
<html>
<head>
  <title>Inbox</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>

<body class="bg-black text-white">

<div class="flex h-screen">

  <!-- LEFT: Chat List -->
  <div id="user-list" class="w-1/3 border-r border-gray-700 p-4">
    <h2 class="text-xl font-bold mb-4">Inbox</h2>
  </div>

  <!-- RIGHT: Chat Area -->
  <div class="w-2/3 flex flex-col">

    <div class="p-4 border-b border-gray-700">
      <h2 id="chat-user">Select a chat</h2>
    </div>

    <div id="chat-box" class="flex-1 p-4 overflow-y-auto space-y-2"></div>

    <div class="p-4 flex">
      <input id="message" class="flex-1 p-2 bg-gray-800 rounded-full px-4" placeholder="Type message..." />
      <button onclick="sendMessage()" class="ml-2 bg-indigo-500 px-4 rounded-full">
        Send
      </button>
    </div>

  </div>

</div>

<script>
const socket = io();

// 👇 Login simulation
const userId = prompt("Enter your ID (e.g. influencer1 / brand1)");
const role = prompt("Enter role (influencer/brand)");

socket.emit("join", { userId, role });
console.log("User:", userId, "Role:", role);

// 👇 dynamic users based on role
const users = role === "influencer"
  ? ["brand1", "brand2"]
  : ["influencer1", "influencer2"];

const userList = document.getElementById("user-list");

users.forEach(u => {
  const div = document.createElement("div");
  div.className = "p-3 bg-gray-800 rounded mb-2 cursor-pointer hover:bg-gray-700";
  div.innerText = u;

  div.onclick = () => selectUser(u);

  userList.appendChild(div);
});

let currentRoom = "";
let currentUser = "";

// 👉 select chat
function selectUser(otherUser) {
  currentUser = otherUser;
  document.getElementById("chat-user").innerText = otherUser;

  currentRoom = [userId, otherUser].sort().join("_");

  socket.emit("join_room", currentRoom);

  document.getElementById("chat-box").innerHTML = "";
}

// 👉 send message
function sendMessage() {
  const input = document.getElementById("message");
  const message = input.value;

  if (!message || !currentRoom) {
    alert("Select a chat first!");
    return;
  }

  socket.emit("send_message", {
    roomId: currentRoom,
    message
  });

  input.value = "";
}

// 👉 receive message
socket.on("receive_message", (data) => {
  const chatBox = document.getElementById("chat-box");

  const msg = document.createElement("div");

  if (data.sender === userId) {
    msg.className = "flex justify-end";
    msg.innerHTML = `
      <div class="bg-indigo-500 text-white px-4 py-2 rounded-xl max-w-xs">
        ${data.message}
      </div>
    `;
  } else {
    msg.className = "flex justify-start";
    msg.innerHTML = `
      <div class="bg-gray-700 text-white px-4 py-2 rounded-xl max-w-xs">
        ${data.message}
      </div>
    `;
  }

  chatBox.appendChild(msg);
  chatBox.scrollTop = chatBox.scrollHeight;
});
</script>

</body>
</html>
